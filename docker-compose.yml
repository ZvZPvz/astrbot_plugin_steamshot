services:
  astrbot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: astrbot-steamshot:latest
    container_name: astrbot-steamshot
    restart: unless-stopped
    ports:
      - "6185:6185"
    environment:
      TZ: Asia/Shanghai
      ASTRBOT_DATA_DIR: /AstrBot/data
      STEAMSHOT_BROWSER_KIND: auto
      STEAMSHOT_SKIP_WDM: "0"
    shm_size: "1gb"
    volumes:
      - ./data:/AstrBot/data
      - ./:/AstrBot/data/plugins/astrbot_plugin_steamshot
